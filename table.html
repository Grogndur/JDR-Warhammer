<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>La Table — Warhammer JdR</title>

<!-- API YouTube (ambiance sonore synchronisée) -->
<script src="https://www.youtube.com/iframe_api"></script>
<!-- Daily (caméras encastrées dans la page) -->
<script src="https://unpkg.com/@daily-co/daily-js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  :root{
    --noir:#14110d;
    --noir-2:#1d1812;
    --surface:#241d15;
    --surface-2:#2c2419;
    --laiton:#c9a25a;
    --laiton-sombre:#8a6d2f;
    --oxblood:#9b2226;
    --oxblood-clair:#c1453f;
    --parchemin:#e9dcc2;
    --parchemin-doux:#c9bca0;
    --vert-succes:#7f9b54;
    --bord:#3a2f20;
    --ombre:0 10px 30px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 50% -10%, #20190f 0%, var(--noir) 60%) ,
      var(--noir);
    color:var(--parchemin);
    font-family:"EB Garamond",Georgia,serif;
    font-size:17px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.cinzel{font-family:"Cinzel",serif;letter-spacing:.04em}

  /* ---- Structure ---- */
  .app{
    display:grid;
    height:100dvh;position:relative;overflow:hidden;
  }

  header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;
    padding:6px 12px;flex-wrap:wrap;pointer-events:none;
    background:linear-gradient(180deg, rgba(8,6,4,.96), rgba(8,6,4,.45) 80%, transparent)}
  header .retour{pointer-events:auto;font-family:"Cinzel",serif;font-size:12px;letter-spacing:.04em;
    color:var(--parchemin-doux);text-decoration:none;transition:color .15s ease}
  header .retour:hover{color:var(--laiton)}
  .dock-poignee{position:fixed;left:50%;bottom:0;transform:translateX(-50%);z-index:29;
    height:18px;line-height:16px;padding:0 20px;font-size:11px;cursor:pointer;
    border:1px solid var(--bord);border-bottom:0;border-radius:8px 8px 0 0;
    background:linear-gradient(180deg,var(--surface-2),var(--surface));color:var(--laiton)}
  .dock-poignee:active{transform:translateX(-50%) translateY(1px)}
  .titre{display:flex;align-items:baseline;gap:.5ch;margin:0;
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    white-space:nowrap;pointer-events:none}
  .titre .comete{color:var(--oxblood-clair);font-size:.8em}
  .titre h1{font-size:clamp(15px,2vw,21px);margin:0;color:var(--laiton)}
  header .spacer{flex:1}
  header .champ input{padding:4px 8px;font-size:13px;width:120px}
  header .toggle{font-size:12px}
  header button{padding:5px 9px;font-size:12px}

  /* champs */
  .champ{display:flex;align-items:center;gap:6px}
  label{font-size:13px;color:var(--parchemin-doux);text-transform:uppercase;letter-spacing:.08em}
  input[type=text],input[type=number],input[type=url]{
    background:var(--noir-2);
    border:1px solid var(--bord);
    color:var(--parchemin);
    padding:7px 9px;border-radius:6px;font-family:inherit;font-size:15px;
    min-width:0;
  }
  input:focus{outline:2px solid var(--laiton-sombre);outline-offset:1px}
  .toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--oxblood)}

  button{
    font-family:"Cinzel",serif;
    background:linear-gradient(180deg,var(--surface-2),var(--surface));
    color:var(--parchemin);
    border:1px solid var(--laiton-sombre);
    padding:8px 12px;border-radius:7px;cursor:pointer;
    letter-spacing:.04em;font-size:13px;
    transition:border-color .15s ease, transform .05s ease, background .15s ease;
  }
  button:hover{border-color:var(--laiton);background:linear-gradient(180deg,#34291c,var(--surface-2))}
  button:active{transform:translateY(1px)}
  button.primaire{border-color:var(--oxblood);color:#f6e7c8;
    background:linear-gradient(180deg,#7a1f1f,#5d1717)}
  button.primaire:hover{border-color:var(--oxblood-clair)}
  button:disabled{opacity:.4;cursor:not-allowed}

  /* ---- Scène plein écran (image au centre, priorité visuelle) ---- */
  .scene{
    position:absolute;inset:0;overflow:hidden;
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,.18) 0 2px, transparent 2px 7px),
      radial-gradient(120% 120% at 50% 40%, #1b150e 0%, #0c0a07 100%);
    box-shadow:inset 0 0 120px rgba(0,0,0,.8);
    display:flex;align-items:center;justify-content:center;
  }
  .scene img{max-width:100%;max-height:100%;object-fit:contain;display:none}
  .scene .vide{
    text-align:center;color:var(--parchemin-doux);padding:24px;max-width:440px
  }
  .scene .vide .comete{font-size:34px;color:var(--oxblood);display:block;margin-bottom:8px}

  /* ---- Initiative : panneau vertical déplaçable ---- */
  .initiative{position:fixed;top:318px;left:12px;width:220px;max-height:46vh;z-index:24;
    display:flex;flex-direction:column;overflow:hidden;
    background:rgba(18,14,10,.93);border:1px solid var(--bord);border-radius:10px;box-shadow:var(--ombre)}
  .initiative.replie{display:none}
  .ini-tete{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--bord);cursor:move}
  .ini-tete .pt{color:var(--laiton);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .ini-tete .ini-round{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.04em;
    color:var(--parchemin-doux);white-space:nowrap}
  .ini-tete .spacer{flex:1}
  .ini-liste{flex:1;overflow:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
  .ini-vide{color:var(--parchemin-doux);font-size:12px;text-align:center;padding:12px 4px;opacity:.7}
  .ini-chip{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:7px;
    border:1px solid var(--bord);background:rgba(40,32,24,.55);font-size:13px;
    color:var(--parchemin-doux)}
  .ini-chip.actif{border-color:var(--laiton);background:rgba(176,144,42,.20);
    color:var(--parchemin);box-shadow:0 0 0 1px var(--laiton) inset}
  .ini-chip .ini-val{min-width:24px;text-align:center;color:var(--laiton);font-weight:700;font-variant-numeric:tabular-nums}
  .ini-chip .ini-nom{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ini-av{display:inline-flex;align-items:center;gap:3px}
  .ini-av::before{content:"Av";font-size:9px;letter-spacing:.04em;opacity:.55;margin-right:1px}
  .ini-av b{min-width:13px;text-align:center;color:var(--laiton);font-variant-numeric:tabular-nums}
  .ini-av button,.ini-x{cursor:pointer;font-family:inherit;line-height:18px;border-radius:5px;
    border:1px solid var(--bord);background:rgba(40,32,24,.7);color:var(--parchemin-doux)}
  .ini-av button{padding:0 6px;font-size:13px}
  .ini-x{padding:0 6px;color:#c0613f}
  .ini-av button:hover,.ini-x:hover{border-color:var(--laiton)}
  body:not(.est-mj) .ini-av button,body:not(.est-mj) .ini-x{display:none}

  /* ---- Calque des dés 3D (sur le plateau, sous les panneaux) ---- */
  #dice3d{position:absolute;top:44px;left:0;right:0;bottom:0;z-index:10;pointer-events:none}
  #dice3d>div{position:absolute;inset:0}
  #dice3d canvas{display:block;width:100%;height:100%;background:transparent;border:0}

  /* ---- Caméras flottantes, déplaçables et redimensionnables ---- */
  .cams{position:absolute;top:52px;left:12px;width:340px;height:250px;z-index:25;
    border:1px solid var(--laiton-sombre);border-radius:10px;overflow:hidden;
    background:var(--noir-2);display:flex;flex-direction:column;
    resize:both;min-width:170px;min-height:120px;box-shadow:var(--ombre)}
  .cams .cams-tete{display:flex;align-items:center;gap:8px;padding:4px 9px;
    border-bottom:1px solid var(--bord);cursor:move;user-select:none;touch-action:none}
  .cams .cams-tete .pt{color:var(--laiton);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .cams .cams-tete .spacer{flex:1}
  .cams .jitsi{flex:1;min-height:0}
  .cams .jitsi iframe{width:100%;height:100%;border:0;display:block}
  .mini{padding:2px 7px;font-size:12px;min-width:0}
  .cams-msg{padding:14px;color:var(--parchemin-doux);font-size:13px;text-align:center}

  /* ---- Dock du bas, compact et repliable ---- */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:28;
    display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;
    padding:7px 10px;border-top:1px solid var(--bord);
    background:linear-gradient(0deg, rgba(8,6,4,.97), rgba(8,6,4,.78));
    transition:transform .2s ease}
  .dock.replie{transform:translateY(110%)}
  .grp{display:flex;flex-direction:column;gap:5px;background:rgba(36,29,21,.55);
    border:1px solid var(--bord);border-radius:8px;padding:6px 8px}
  .grp-journal{flex:1;min-width:170px;padding:4px 8px}
  .ligne{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .dock label{font-size:11px}
  .dock input[type=text],.dock input[type=number],.dock input[type=url]{padding:4px 7px;font-size:13px}
  .dock #cible{width:50px}
  .dock #custom{width:66px}
  .dock #nom{width:120px}
  .dock #img-url,.dock #amb-url{width:148px}
  .dock button{padding:5px 9px;font-size:12px}
  .dock input[type=range]{width:88px;accent-color:var(--laiton-sombre)}
  .amb-activer{margin-left:auto;align-self:center}

  .gm-only{display:none}
  body.est-mj .gm-only{display:flex}

  /* Journal des jets (panneau vertical, à droite) */
  .journal-panel{position:fixed;top:52px;bottom:104px;right:0;width:236px;z-index:24;
    display:flex;flex-direction:column;overflow:hidden;
    background:rgba(18,14,10,.93);border:1px solid var(--bord);border-right:0;
    border-radius:10px 0 0 10px;box-shadow:var(--ombre)}
  .journal-panel.replie{display:none}
  .jp-tete{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--bord)}
  .jp-tete .pt{color:var(--laiton);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .jp-tete .spacer{flex:1}
  .journal{flex:1;overflow:auto;display:flex;flex-direction:column;gap:4px;padding:8px}
  .jet{border-left:3px solid var(--laiton-sombre);background:var(--noir-2);
    padding:3px 8px;border-radius:0 5px 5px 0;font-size:13px}
  .jet .qui{color:var(--laiton);font-family:"Cinzel",serif;font-size:11px;letter-spacing:.05em}
  .jet .res{font-size:14px}
  .jet.succes{border-left-color:var(--vert-succes)}
  .jet.echec{border-left-color:var(--oxblood)}
  .jet .marque{font-style:italic;color:var(--parchemin-doux)}
  .jet.crit .marque{color:var(--vert-succes);font-weight:600;font-style:normal}
  .jet.fumble .marque{color:var(--oxblood-clair);font-weight:600;font-style:normal}

  .galerie{display:flex;gap:6px;flex-wrap:wrap}
  .galerie button{font-size:12px}

  .secret-res{font-family:"Cinzel",serif;color:var(--parchemin-doux);font-size:14px}
  .secret-loc{color:var(--oxblood-clair);font-style:italic;font-size:14px}

  /* ---- Lecteur d'ambiance (invisible, le son sort de chaque appareil) ---- */
  .amb-player{position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;overflow:hidden;pointer-events:none}
  .err{color:var(--oxblood-clair);font-size:12px}

  .alerte{position:fixed;top:54px;left:50%;transform:translateX(-50%);z-index:22;
    background:var(--surface);border:1px solid var(--oxblood);color:var(--parchemin);
    padding:10px 14px;border-radius:8px;font-size:14px;max-width:520px;text-align:center}

  @media (max-width:760px){
    .cams{width:200px;height:150px;top:auto;bottom:118px;left:8px}
    .journal-panel{width:180px;bottom:118px}
    .dock #img-url,.dock #amb-url{width:120px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ---- Écran d'entrée ---- */
  .gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(900px 600px at 50% 20%, #211a10, #0b0906 70%)}
  .gate .carte{background:var(--surface);border:1px solid var(--laiton-sombre);
    border-radius:14px;padding:28px 30px;max-width:360px;width:90%;text-align:center;box-shadow:var(--ombre)}
  .gate .comete{color:var(--oxblood);font-size:30px;display:block;margin-bottom:6px}
  .gate h1{font-size:22px;color:var(--laiton);margin:0 0 4px}
  .gate p{color:var(--parchemin-doux);font-style:italic;font-size:14px;margin:0 0 18px}
  .gate input{width:100%;text-align:center;font-size:18px;margin-bottom:12px}
  .gate button{width:100%}
  .gate .err{color:var(--oxblood-clair);font-size:14px;min-height:18px;margin-top:10px}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="carte">
    <span class="comete">✦</span>
    <h1>La Table de Warhammer</h1>
    <p>Le Vieux Monde n'ouvre ses portes qu'aux initiés.</p>
    <input type="text" id="gate-nom" placeholder="Ton nom" maxlength="24" autocomplete="off" />
    <input type="password" id="gate-mdp" placeholder="Mot de passe" autocomplete="off" />
    <button class="primaire" id="gate-ok">Entrer</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<div class="app" id="app">

  <section class="scene" id="scene">
    <div class="vide" id="scene-vide">
      <span class="comete">✦</span>
      En attente d'une image. Le MJ peut afficher une carte ou une illustration pour toute la table.
    </div>
    <img id="image" alt="Image partagée" />
  </section>

  <div id="dice3d"><div id="dice3d-d"></div><div id="dice3d-u"></div></div>

  <header>
    <a class="retour" href="index.html" title="Retour à l'accueil">← Accueil</a>
    <div class="titre"><span class="comete">✦</span><h1>La Table de Warhammer</h1></div>
  </header>

  <div class="alerte" id="alerte" style="display:none"></div>

  <aside class="initiative replie" id="initiative">
    <div class="ini-tete" id="init-drag">
      <span class="pt">Initiative</span>
      <span class="ini-round" id="init-round">Round 1</span>
      <span class="spacer"></span>
      <button id="fermer-init" class="mini" title="Masquer">×</button>
    </div>
    <div class="ini-liste" id="init-liste"></div>
  </aside>

  <aside class="cams" id="cams">
    <div class="cams-tete" id="cams-drag">
      <span class="pt">Caméras</span>
      <span class="spacer"></span>
      <button id="cams-rejoindre" class="mini" title="Rejoindre / reconnecter">⟳</button>
    </div>
    <div class="jitsi" id="callframe"></div>
  </aside>

  <aside class="journal-panel" id="journal-panel">
    <div class="jp-tete">
      <span class="pt">Journal des jets</span>
      <span class="spacer"></span>
      <button id="fermer-journal" class="mini" title="Masquer">×</button>
    </div>
    <div class="journal" id="journal"></div>
  </aside>

  <div class="amb-player"><div id="yt"></div></div>

  <section class="dock" id="dock">

    <div class="grp">
      <div class="ligne">
        <input type="text" id="nom" placeholder="Ton nom" maxlength="24" />
        <label class="toggle"><input type="checkbox" id="mj" /> MJ</label>
        <button id="ouvrir-cams" title="Afficher ou masquer les caméras">📹 Caméras</button>
        <button id="ouvrir-journal" title="Afficher ou masquer le journal">📜 Journal</button>
        <button id="ouvrir-init" title="Afficher ou masquer l'initiative">⚔ Initiative</button>
      </div>
    </div>

    <div class="grp">
      <div class="ligne">
        <label for="cible">Test</label>
        <input type="number" id="cible" min="1" max="100" value="45" />
        <button class="primaire" id="lancer-test">Lancer</button>
        <button data-de="100">d100</button>
        <button data-de="10">d10</button>
        <button data-de="6">d6</button>
        <button data-de="4">d4</button>
        <input type="text" id="custom" placeholder="2d6+3" />
        <button id="lancer-custom">Lancer</button>
        <button id="vider-des" title="Retirer les dés de la table">🧹 Table</button>
      </div>
      <div class="ligne gm-only">
        <button id="jet-secret">Jet secret</button>
        <span class="secret-res" id="secret-res">—</span>
        <span class="secret-loc" id="secret-loc"></span>
      </div>
    </div>

    <div class="grp gm-only">
      <div class="ligne">
        <input type="text" id="init-add" placeholder="Gobelin 42" />
        <button id="init-ajout">+ Combattant</button>
        <button id="init-suivant" class="primaire">Tour ▶</button>
        <button id="init-vider" title="Vider l'initiative">✕</button>
      </div>
    </div>

    <div class="grp gm-only">
      <div class="ligne">
        <label for="img-url">Image</label>
        <input type="url" id="img-url" placeholder="lien ou images/x.png" />
        <button class="primaire" id="afficher-img">Afficher</button>
        <button id="vider-img" title="Retirer l'image">✕</button>
      </div>
      <div class="ligne">
        <label for="amb-url">Ambiance</label>
        <input type="url" id="amb-url" placeholder="Lien YouTube" />
        <button id="amb-load">Charger</button>
        <button id="amb-play" title="Lecture">▶</button>
        <button id="amb-pause" title="Pause">⏸</button>
        <button id="amb-stop" title="Couper">⏹</button>
        <input type="range" id="amb-vol" min="0" max="100" value="50" title="Volume" />
      </div>
      <div class="galerie" id="galerie"></div>
      <div class="err" id="amb-err"></div>
    </div>

    <button id="amb-activer" class="amb-activer" title="Démarrer le son d'ambiance si tu ne l'entends pas">🔊 Son</button>

  </section>

  <button id="basculer-dock" class="dock-poignee" title="Plier ou afficher la barre">▾</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, query, limitToLast, onChildAdded }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ---------- Salle (commune à Firebase ET aux caméras) ----------
const params = new URLSearchParams(location.search);

const VIDE_DEFAUT = '<span class="comete">✦</span> En attente d\'une image. Le MJ peut afficher une carte ou une illustration pour toute la table.';
function montrerImage(url){
  if(url){
    img.onload  = ()=>{ img.style.display="block"; vide.style.display="none"; };
    img.onerror = ()=>{ img.style.display="none";
      vide.innerHTML = '<span class="comete">✦</span> Image introuvable. Vérifie le lien ou le chemin.';
      vide.style.display="block"; };
    img.src = url;
  } else {
    img.removeAttribute("src"); img.style.display="none";
    vide.innerHTML = VIDE_DEFAUT; vide.style.display="block";
  }
}

function pousserImage(url){
  if(!refImage){ alerte("Firebase requis pour partager une image."); return; }
  set(refImage, url ? { url, par: nom(), ts: Date.now() } : null);
}

function lienImageDirect(u){
  u = (u||"").trim();
  if(/drive\.google\.com/.test(u)){
    const m = u.match(/\/file\/d\/([\w-]+)/) || u.match(/[?&]id=([\w-]+)/);
    if(m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w2000";
  }
  return u;
}

function nom(){ return ($("#nom").value.trim() || "Aventurier").slice(0,24); }

// ---------- Dés ----------
function envoyerJet(jet){
  // jet = { nom, res, detail, classe, marque }
  if(refJets){ push(refJets, { ...jet, ts: Date.now() }); }
  else { afficherJet(jet); } // hors-ligne : visible seulement chez soi
}

function lancerTest(cible){
  const r = Math.floor(Math.random()*100)+1;       // 1..100
  const dizR = (r===100) ? 0 : Math.floor(r/10);
  const uniR = (r===100) ? 0 : r%10;
  const dizC = Math.floor(cible/10);
  const sl = dizC - ((r===100)?10:dizR);            // Degrés de Réussite
  const succes = r <= cible;
  const dbl = (dizR === uniR);                      // doublé = crit/maladresse
  const loc = localisation(uniR*10 + dizR);         // localisation (dés inversés)
  let classe = succes ? "succes" : "echec";
  let marque = `DR ${sl>=0?"+":""}${sl}`;
  if(dbl && succes){ classe += " crit";   marque = "Critique ! " + marque; }
  if(dbl && !succes){ classe += " fumble"; marque = "Maladresse ! " + marque; }
  const affR = (r===100) ? "00" : String(r).padStart(2,"0");
  envoyerJet({
    nom: nom(),
    res: `${affR}  (cible ${cible})`,
    detail: (succes ? "Réussite" : "Échec") + " · " + loc,
    classe, marque,
    des: { faces:10, vals:[dizR, uniR], pct:true }
  });
}

function lancerExpr(expr){
  // accepte "NdX+M" / "dX" / "X"
  const m = expr.replace(/\s+/g,"").match(/^(\d*)d(\d+)([+-]\d+)?$/i);
  if(!m){
    const n = parseInt(expr,10);
    if(!isNaN(n)){ const r=Math.floor(Math.random()*n)+1; envoyerJet({nom:nom(),res:`${r}`,detail:`d${n}`,classe:"",marque:""}); }
    return;
  }
  const nb = m[1] ? parseInt(m[1],10) : 1;
  const faces = parseInt(m[2],10);
  const mod = m[3] ? parseInt(m[3],10) : 0;
  if(nb<1 || nb>50 || faces<2 || faces>1000) return;
  let total=0; const tirages=[];
  for(let i=0;i<nb;i++){ const t=Math.floor(Math.random()*faces)+1; tirages.push(t); total+=t; }
  total += mod;
  const detailDés = (nb>1 || mod) ? `[${tirages.join(", ")}]${mod?(mod>0?" +"+mod:" "+mod):""}` : `d${faces}`;
  let des = { faces, vals:tirages };
  if(faces===100 && nb===1){                 // un d100 = deux d10 (dizaine + unité)
    const r = tirages[0];
    const dz = (r===100)?0:Math.floor(r/10);
    const un = (r===100)?0:r%10;
    des = { faces:10, vals:[dz, un], pct:true };
  }
  envoyerJet({ nom:nom(), res:`${total}`, detail:detailDés, classe:"", marque:"", des });
}

$("#lancer-test").addEventListener("click", ()=>{

});

// ---------- Jet secret (MJ) : localisation des touches ----------
// On inverse d'abord le résultat des dés (ex: 52 -> 25), puis on lit la table.
function localisation(rev){           // rev de 0 à 99, où 0 vaut "00" (=100)
  if(rev === 0)  return "Jambe droite";   // 90-00
  if(rev <= 9)   return "Tête";           // 01-09
  if(rev <= 24)  return "Bras gauche";    // 10-24
  if(rev <= 44)  return "Bras droit";     // 25-44
  if(rev <= 79)  return "Corps";          // 45-79
  if(rev <= 89)  return "Jambe gauche";   // 80-89
  return "Jambe droite";                  // 90-99
}
$("#jet-secret").addEventListener("click", ()=>{
  const r = Math.floor(Math.random()*100)+1;     // 1..100
  const diz = Math.floor(r/10) % 10;             // 100 -> 0
  const uni = r % 10;
  const rev = uni*10 + diz;                      // dés inversés
  const aff = (r===100) ? "00" : String(r).padStart(2,"0");
  $("#secret-res").textContent = aff;
  $("#secret-loc").textContent = `Localisation = ${localisation(rev)}`;
});

// ---------- Journal ----------
const journal = $("#journal");
function afficherJet(j){
  const el = document.createElement("div");
  el.className = "jet " + (j.classe||"");
  el.innerHTML =
    `<span class="qui">${escape(j.nom)}</span> — `+
    `<span class="res">${escape(j.res)}</span> `+
    `<span class="detail">· ${escape(j.detail||"")}</span>`+
    (j.marque ? ` <span class="marque">· ${escape(j.marque)}</span>` : "");
  journal.prepend(el);
  while(journal.children.length > 60) journal.lastChild.remove();
  if(j.des && (Date.now() - (j.ts||0) < 8000)) lancerDes3D(j.des, j.nom);
}
function escape(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

if(refJets){
  onChildAdded(query(refJets, limitToLast(30)), (snap)=>{

  });

// ---------- Dés 3D (physique, par-dessus le plateau) ----------
// Le calque #dice3d est dimensionné pour s'arrêter au bandeau du haut, à la barre
// du bas et au journal : les dés rebondissent sur ces bords et restent visibles.
let boxU = null, boxD = null, box3dPret = false;
const TEINTE_DIZAINE = { background:"#e6dcc3", foreground:"#2a2018", texture:"none", material:"plastic" };

function couleurDe(n){                                   // une teinte stable par lanceur
  let h = 0; for(const c of (n||"Aventurier")) h = (h*31 + c.charCodeAt(0)) % 360;
  return "hsl(" + h + ",65%,52%)";
}
function hslVersHex(hsl){
  const m = hsl.match(/hsl\((\d+),(\d+)%,(\d+)%\)/); if(!m) return "#b0902a";
  let H=+m[1], S=+m[2]/100, L=+m[3]/100;
  const k=n=>(n+H/30)%12, a=S*Math.min(L,1-L);
  const f=n=>L-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const t=x=>Math.round(255*x).toString(16).padStart(2,"0");
  return "#"+t(f(0))+t(f(8))+t(f(4));
}
function teinteJoueur(n){ return { background:hslVersHex(couleurDe(n)), foreground:"#15110b", texture:"none", material:"plastic" }; }

function zoneDes(){                                      // borne le plateau aux bandeaux
  const el = document.getElementById("dice3d"); if(!el) return;
  const h = document.querySelector("header");
  const dock = document.getElementById("dock");
  const jp = document.getElementById("journal-panel");
  el.style.top    = (((h&&h.offsetHeight)||44)) + "px";
  el.style.bottom = (dock && !dock.classList.contains("replie") ? dock.offsetHeight : 0) + "px";
  el.style.right  = (jp && !jp.classList.contains("replie") ? jp.offsetWidth : 0) + "px";
  el.style.left   = "0px";
  for(const b of [boxU, boxD]){ if(b && b.onWindowResize){ try{ b.onWindowResize(); }catch(e){} } }
}
async function initDes3D(){
  try{
    const mod = await import("https://esm.sh/@3d-dice/dice-box-threejs");
    const DiceBox = mod.default || mod.DiceBox || mod;
    zoneDes();
    const opts = { sounds:false, gravity_multiplier:400, baseScale:90, strength:2.2, theme_material:"plastic", onRollComplete:()=>{} };
    boxU = new DiceBox("#dice3d-u", opts);
    await boxU.initialize();
    box3dPret = true;                                    // au moins les unités sont prêtes
    try{
      boxD = new DiceBox("#dice3d-d", opts);
      await boxD.initialize();
    }catch(e2){ console.warn("Calque dizaine indisponible, repli sur couleur unique :", e2); boxD = null; }
  }catch(e){ console.warn("Dés 3D indisponibles (le reste fonctionne) :", e); box3dPret = false; }
}
function lancerDes3D(des, n){
  if(!box3dPret || !boxU || !des || !des.vals || !des.vals.length) return;
  viderTableLocal();                                  // les dés du jet précédent disparaissent
  try{
    if(des.pct){                                        // test : dizaine distincte, unité couleur joueur
      if(boxD){
        if(boxD.updateConfig) boxD.updateConfig({ theme_customColorset: TEINTE_DIZAINE });
        boxD.roll("1d10@" + des.vals[0]);
        if(boxU.updateConfig) boxU.updateConfig({ theme_customColorset: teinteJoueur(n) });
        boxU.roll("1d10@" + des.vals[1]);
      } else {                                          // repli : deux d10 de même couleur
        if(boxU.updateConfig) boxU.updateConfig({ theme_customColorset: teinteJoueur(n) });
        boxU.roll("2d10@" + des.vals.join(","));
      }
      return;
    }
    if(![4,6,8,10,12,20].includes(des.faces)) return;   // autres jets : un seul dé coloré
    if(boxU.updateConfig) boxU.updateConfig({ theme_customColorset: teinteJoueur(n) });
    boxU.roll(des.vals.length + "d" + des.faces + "@" + des.vals.join(","));
  }catch(e){ /* silencieux : le journal fait foi */ }
}
function viderTableLocal(){
  for(const b of [boxU, boxD]){ if(b){ try{ if(b.clearDice) b.clearDice(); }catch(e){} } }
}
function demanderViderDes(){ if(refDesClear) set(refDesClear, Date.now()); else viderTableLocal(); }
if(refDesClear){ onValue(refDesClear, ()=> viderTableLocal()); }
window.addEventListener("resize", zoneDes);
initDes3D();

// ---------- Initiative (bandeau synchronisé) ----------
let initEtat = { ordre:[], actif:null, round:0 };
let initPremier = true;

function pousserInit(){ if(refInit) set(refInit, initEtat); else rendreInit(); }

function rendreInit(){
  const liste = $("#init-liste"); if(!liste) return;
  const roundEl = $("#init-round");
  const list = [...(initEtat.ordre||[])].sort((a,b)=> b.init - a.init);
  if(roundEl) roundEl.textContent = "Round " + (initEtat.round||1);
  if(!list.length){
    liste.innerHTML = `<div class="ini-vide">Aucun combat en cours</div>`;
    return;
  }
  liste.innerHTML = list.map(c=>{
    const a = (c.id===initEtat.actif) ? " actif" : "";
    return `<div class="ini-chip${a}" data-id="${c.id}">`+
      `<span class="ini-val">${c.init}</span>`+
      `<span class="ini-nom">${escape(c.nom)}</span>`+
      `<span class="ini-av"><button data-act="moins" title="Avantage -1">−</button>`+
      `<b>${c.av||0}</b>`+
      `<button data-act="plus" title="Avantage +1">+</button></span>`+
      `<button class="ini-x" data-act="x" title="Retirer">×</button>`+
    `</div>`;
  }).join("");
}

function iniAdd(){
  const champ = $("#init-add");
  const v = (champ.value||"").trim(); if(!v) return;
  const m = v.match(/^(.*?)[\s,]+(-?\d+)\s*$/);          // "Nom 42"
  const nom = (m ? (m[1].trim()||"Combattant") : v).slice(0,24);
  const init = m ? parseInt(m[2],10) : 0;
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  initEtat.ordre = [...(initEtat.ordre||[]), { id, nom, init, av:0 }];
  champ.value = "";
  $("#initiative").classList.remove("replie");
  pousserInit();
}
function iniSuivant(){
  const list = [...(initEtat.ordre||[])].sort((a,b)=> b.init - a.init);
  if(!list.length) return;
  if(!initEtat.actif){ initEtat.actif = list[0].id; initEtat.round = 1; }
  else {
    const i = list.findIndex(c=>c.id===initEtat.actif);
    const n = i + 1;
    if(n >= list.length){ initEtat.round = (initEtat.round||1) + 1; initEtat.actif = list[0].id; }
    else initEtat.actif = list[n].id;
  }
  $("#initiative").classList.remove("replie");
  pousserInit();
}
function iniVider(){
  initEtat = { ordre:[], actif:null, round:0 };
  $("#initiative").classList.add("replie");
  pousserInit();
}
function iniAv(id, d){
  const c = (initEtat.ordre||[]).find(x=>x.id===id); if(!c) return;
  c.av = Math.max(0, (c.av||0) + d);
  pousserInit();
}
function iniRemove(id){
  initEtat.ordre = (initEtat.ordre||[]).filter(x=>x.id!==id);
  if(initEtat.actif===id) initEtat.actif = null;
  pousserInit();
}

$("#ouvrir-init").addEventListener("click", ()=>{ $("#initiative").classList.toggle("replie"); zoneDes(); });
$("#init-ajout").addEventListener("click", iniAdd);
$("#init-add").addEventListener("keydown", e=>{ if(e.key==="Enter") iniAdd(); });
$("#init-suivant").addEventListener("click", iniSuivant);
$("#init-vider").addEventListener("click", iniVider);
$("#initiative").addEventListener("click", e=>{
  const btn = e.target.closest("[data-act]"); if(!btn) return;
  const chip = e.target.closest(".ini-chip"); if(!chip) return;
  const id = chip.dataset.id, act = btn.dataset.act;
  if(act==="plus") iniAv(id, +1);
  else if(act==="moins") iniAv(id, -1);
  else if(act==="x") iniRemove(id);
});
$("#fermer-init").addEventListener("click", ()=> $("#initiative").classList.add("replie"));
(function(){
  const panel = $("#initiative"), poignee = $("#init-drag");
  if(!panel || !poignee) return;
  let actif=false, dx=0, dy=0;
  poignee.addEventListener("pointerdown", e=>{
    if(e.target.closest("button")) return;
    actif=true; const r=panel.getBoundingClientRect();
    dx=e.clientX-r.left; dy=e.clientY-r.top;
    try{ poignee.setPointerCapture(e.pointerId); }catch(_){}
  });
  poignee.addEventListener("pointermove", e=>{
    if(!actif) return;
    const x=Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  e.clientX-dx));
    const y=Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, e.clientY-dy));
    panel.style.left=x+"px"; panel.style.top=y+"px"; panel.style.right="auto";
  });
  const fin=()=>{ actif=false; };
  poignee.addEventListener("pointerup", fin);
  poignee.addEventListener("pointercancel", fin);
})();

if(refInit){
  onValue(refInit, snap=>{
    initEtat = snap.val() || { ordre:[], actif:null, round:0 };
    if(initEtat.ordre && !Array.isArray(initEtat.ordre)) initEtat.ordre = Object.values(initEtat.ordre);
    if(!initEtat.ordre) initEtat.ordre = [];
    rendreInit();
    if(initPremier){
      initPremier = false;
      $("#initiative").classList.toggle("replie", initEtat.ordre.length === 0);
    }
  });
} else {
  rendreInit();
}

// ---------- Caméras (Daily, encastrées dans la page) ----------
let callFrame = null;
function lancerCams(){
  const cont = document.getElementById("callframe");
  if(!window.DailyIframe){ cont.innerHTML = "<div class='cams-msg'>Module caméras non chargé.</div>"; return; }
  const url = window.DAILY_ROOM_URL;
  if(!url){ cont.innerHTML = "<div class='cams-msg'>Caméras non configurées : colle l'adresse de ta salle Daily en haut du fichier.</div>"; return; }
  try{ if(callFrame){ callFrame.destroy(); callFrame = null; } }catch(e){}
  cont.innerHTML = "";
  callFrame = window.DailyIframe.createFrame(cont, {
    iframeStyle: { width:"100%", height:"100%", border:"0" },
    showLeaveButton:false, showFullscreenButton:true,
    activeSpeakerMode:false,                       // mosaïque : tout le monde à taille égale
    layoutConfig:{ grid:{ maxTilesPerPage:25 } }
  });
  callFrame.join({ url, userName: nom() });
}

// ---------- Déplacer le panneau caméras où on veut ----------
(function(){
  const cams = $("#cams"), poignee = $("#cams-drag");
  let dx=0, dy=0, actif=false;
  poignee.addEventListener("pointerdown", e=>{
    if(e.target.closest("button")) return;          // laisser les boutons cliquables
    actif = true;
    const r = cams.getBoundingClientRect();
    dx = e.clientX - r.left; dy = e.clientY - r.top;
    cams.style.right = "auto";
    poignee.setPointerCapture(e.pointerId);
  });
  poignee.addEventListener("pointermove", e=>{
    if(!actif) return;
    const dock = document.querySelector("#dock");
    const dockH = (dock && !dock.classList.contains("replie")) ? dock.offsetHeight + 4 : 0;
    const basMax = window.innerHeight - dockH - cams.offsetHeight;
    let x = Math.max(0, Math.min(window.innerWidth - cams.offsetWidth, e.clientX - dx));
    let y = Math.max(0, Math.min(basMax, e.clientY - dy));
    cams.style.left = x + "px"; cams.style.top = y + "px";
  });
  poignee.addEventListener("pointerup", ()=>{ actif = false; });
})();

// ---------- Ambiance sonore (YouTube synchronisé) ----------
// Le MJ pilote ; le son est joué par le navigateur de chacun, pas par le micro.
const refAmb = db ? ref(db, `salles/${salle}/ambiance`) : null;
let player = null, ytPret = false, ambCourant = {};

function ytId(u){
  u = (u||"").trim();
  let m = u.match(/[?&]v=([\w-]{11})/);     if(m) return m[1];
  m = u.match(/youtu\.be\/([\w-]{11})/);     if(m) return m[1];
  m = u.match(/\/embed\/([\w-]{11})/);       if(m) return m[1];
  if(/^[\w-]{11}$/.test(u)) return u;
  return null;
}
window.onYouTubeIframeAPIReady = function(){
  player = new YT.Player("yt", {
    width:"100%", height:"140",
    playerVars:{ rel:0, modestbranding:1, playsinline:1 },
    events:{ onReady:()=>{ ytPret = true; appliquerAmb(ambCourant); } }
  });
};
// Si l'API YouTube est déjà prête (course possible au chargement), on initialise tout de suite.
if(window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
function appliquerAmb(a){
  if(!ytPret || !player || !a) return;
  if(a.videoId && a.etat !== "stop" && a.videoId !== player.__vid){
    player.__vid = a.videoId;
    if(a.etat === "play") player.loadVideoById(a.videoId);
    else                  player.cueVideoById(a.videoId);
  }
  if(typeof a.volume === "number" && player.setVolume) player.setVolume(a.volume);
  if(a.etat === "play"  && player.playVideo)  player.playVideo();
  if(a.etat === "pause" && player.pauseVideo) player.pauseVideo();
  if(a.etat === "stop"  && player.stopVideo){ player.stopVideo(); player.__vid = null; }
}
function pousserAmb(maj){
  const o = { ...ambCourant, ...maj };
  if(refAmb){ set(refAmb, { ...o, ts:Date.now() }); }
  else { ambCourant = o; appliquerAmb(o); }
}
if(refAmb){
  onValue(refAmb, snap=>{ ambCourant = snap.val() || {}; appliquerAmb(ambCourant); });
}
$("#amb-load").addEventListener("click", ()=>{
  const id = ytId($("#amb-url").value);
  const err = $("#amb-err");
  if(!id){ err.textContent = "Lien YouTube non reconnu."; return; }
  err.textContent = "";
  pousserAmb({ videoId:id, etat:"play", volume: parseInt($("#amb-vol").value,10) });
});
$("#amb-play").addEventListener("click",  ()=> pousserAmb({ etat:"play"  }));
$("#amb-pause").addEventListener("click", ()=> pousserAmb({ etat:"pause" }));
$("#amb-stop").addEventListener("click",  ()=> pousserAmb({ etat:"stop"  }));
$("#amb-vol").addEventListener("input", e=>{   // retour immédiat pour le MJ
  if(player && player.setVolume) player.setVolume(parseInt(e.target.value,10));
});
$("#amb-vol").addEventListener("change", e=>{  // diffusé à la table au relâcher
  pousserAmb({ volume: parseInt(e.target.value,10) });
});
function flashSon(txt){
  const b = $("#amb-activer");
  if(!b.dataset.libelle) b.dataset.libelle = b.textContent;
  b.textContent = txt;
  clearTimeout(b.__t);
  b.__t = setTimeout(()=>{ b.textContent = b.dataset.libelle; }, 1800);
}
$("#amb-activer").addEventListener("click", ()=>{
  if(!player){ flashSon("Pas prêt…"); return; }
  if(player.unMute) player.unMute();
  if(ambCourant && ambCourant.videoId){
    appliquerAmb(ambCourant);
    flashSon("Son activé ✓");
  } else {
    flashSon("Aucune ambiance lancée");
  }
});
</script>
