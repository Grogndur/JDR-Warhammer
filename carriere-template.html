<style>
  :root {
    --ink:#09080c; --parchment:#f0e8d8; --parchment-dark:#d4c8a8;
    --GLD:#B8922A; --GLD-LT:#e3c66e; --VIO:#4a3a1a; --VIO2:#a07830;
    --GRN:#5a6040; --SUB:#5a5040; --blood:#8B1A1A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--parchment); font-family:'Crimson Text',serif; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse at 25% 0%, rgba(184,146,42,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 100%, rgba(74,58,26,0.08) 0%, transparent 50%);
    pointer-events:none; z-index:0; }

  nav { position:sticky; top:0; z-index:100; background:rgba(9,8,12,0.93); backdrop-filter:blur(8px); border-bottom:1px solid rgba(184,146,42,0.2); padding:0.6rem 1.5rem; display:flex; align-items:center; gap:1rem; }
  nav a { color:var(--SUB); text-decoration:none; font-size:0.82rem; font-style:italic; transition:color 0.2s; }
  nav a:hover { color:var(--GLD); }
  .nav-back { color:var(--GLD-LT) !important; font-style:normal !important; font-family:'Cinzel',serif; font-size:0.68rem !important; letter-spacing:0.08em; text-transform:uppercase; padding:0.32rem 0.7rem; border:1px solid rgba(184,146,42,0.4); border-radius:2px; background:rgba(184,146,42,0.12); transition:all 0.15s; }
  .nav-back:hover { color:var(--GLD-LT) !important; border-color:rgba(227,198,110,0.6); background:rgba(184,146,42,0.24); }
  .nav-current { color:var(--VIO2) !important; font-style:normal; font-family:'Cinzel',serif; font-size:0.82rem; }
  .nav-sep { color:var(--SUB); opacity:0.3; }
  .sync-dot { margin-left:auto; display:flex; align-items:center; gap:0.4rem; font-size:0.7rem; color:var(--SUB); font-style:italic; }
  .sync-dot .pip { width:8px; height:8px; border-radius:50%; background:#555; transition:background 0.3s; box-shadow:0 0 0 rgba(0,0,0,0); }
  .sync-dot.ok .pip { background:var(--GRN); box-shadow:0 0 6px rgba(90,96,64,0.6); }
  .sync-dot.save .pip { background:var(--GLD); box-shadow:0 0 6px rgba(184,146,42,0.6); }
  .sync-dot.err .pip { background:var(--blood); }
  .sync-dot { margin-left:0.8rem; }

  .tool-btn { margin-left:auto; background:rgba(184,146,42,0.12); border:1px solid rgba(184,146,42,0.35); color:var(--GLD-LT); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.32rem 0.7rem; border-radius:2px; cursor:pointer; transition:all 0.15s; }
  .tool-btn:hover { border-color:rgba(227,198,110,0.6); background:rgba(184,146,42,0.24); }

  .layout { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:1.5rem 1rem 4rem; }

  /* ---- En-tête ---- */
  .carr-header { display:flex; gap:1.6rem; align-items:flex-start; padding-bottom:1.4rem; border-bottom:1px solid rgba(184,146,42,0.18); flex-wrap:wrap; }
  .carr-illus { width:190px; flex-shrink:0; }
  .illus-frame { position:relative; width:190px; height:230px; border:1px solid rgba(184,146,42,0.4); border-radius:2px; background:linear-gradient(135deg,rgba(74,58,26,0.28),rgba(9,8,12,0.5)); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .illus-frame img { width:100%; height:100%; object-fit:cover; display:block; }
  .illus-empty { color:var(--SUB); font-style:italic; font-size:0.8rem; text-align:center; padding:0 1rem; line-height:1.5; }
  .illus-btns { display:flex; gap:0.4rem; margin-top:0.5rem; }
  .illus-btns label, .illus-btns button { flex:1; text-align:center; cursor:pointer; background:rgba(184,146,42,0.12); border:1px solid rgba(184,146,42,0.32); color:var(--GLD-LT); font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; padding:0.4rem 0.3rem; border-radius:2px; transition:all 0.15s; }
  .illus-btns label:hover, .illus-btns button:hover { background:rgba(184,146,42,0.24); border-color:rgba(184,146,42,0.55); }
  .illus-btns input[type=file], #illus-file { display:none; }
  .illus-hint { font-size:0.66rem; color:var(--SUB); font-style:italic; margin-top:0.4rem; line-height:1.4; }

  .carr-title-zone { flex:1; min-width:240px; }
  .carr-eyebrow { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--SUB); margin-bottom:0.5rem; }
  .titre-input { background:transparent; border:none; border-bottom:1px solid rgba(184,146,42,0.25); color:var(--parchment); font-family:'Cinzel',serif; font-size:2rem; font-weight:700; letter-spacing:0.04em; width:100%; padding:0.1rem 0; }
  .titre-input:focus { outline:none; border-bottom-color:var(--GLD); }
  .titre-input::placeholder { color:var(--SUB); opacity:0.5; }
  .soustitre-input { background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.06); color:var(--VIO2); font-family:'Crimson Text',serif; font-style:italic; font-size:1rem; width:100%; margin-top:0.6rem; padding:0.1rem 0; }
  .soustitre-input:focus { outline:none; border-bottom-color:var(--VIO2); }
  .soustitre-input::placeholder { color:var(--SUB); opacity:0.5; }
  .desc-input { background:transparent; border:1px solid rgba(255,255,255,0.06); border-radius:2px; color:var(--parchment-dark); font-family:'Crimson Text',serif; font-size:0.95rem; line-height:1.6; width:100%; margin-top:1rem; padding:0.7rem 0.8rem; resize:vertical; min-height:120px; }
  .desc-input:focus { outline:none; border-color:rgba(184,146,42,0.3); }
  .desc-input::placeholder { color:var(--SUB); opacity:0.6; font-style:italic; }

  /* ---- Cartes ---- */
  .card { background:rgba(9,8,12,0.6); border:1px solid rgba(184,146,42,0.15); border-radius:2px; padding:1.1rem 1.2rem; margin-top:1.5rem; }
  .card-title { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--GLD); margin-bottom:1rem; display:flex; align-items:center; gap:0.6rem; }
  .card-title::after { content:''; flex:1; height:1px; background:rgba(184,146,42,0.15); }

  /* ---- Caractéristiques qui progressent (chips par échelon) ---- */
  .zone-hint { color:var(--SUB); font-style:italic; font-size:0.8rem; margin:1.4rem 0 0; line-height:1.5; }
  .carac-row { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .carac-chip { min-width:2.7rem; text-align:center; padding:0.35rem 0.5rem; border:1px solid rgba(184,146,42,0.25); border-radius:2px; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.04em; color:var(--SUB); cursor:pointer; transition:all 0.12s; background:transparent; user-select:none; }
  .carac-chip:hover { border-color:rgba(184,146,42,0.5); color:var(--parchment-dark); }
  .carac-chip.on { background:rgba(184,146,42,0.18); border-color:rgba(184,146,42,0.6); color:var(--GLD-LT); box-shadow:0 0 6px rgba(184,146,42,0.25); }

  /* ---- Listes compétences / talents ---- */
  .entry-list { display:flex; flex-direction:column; gap:0.7rem; }
  .entry { border:1px solid rgba(255,255,255,0.05); border-left:2px solid rgba(184,146,42,0.35); border-radius:2px; padding:0.7rem 0.8rem; background:rgba(255,255,255,0.015); }
  .entry-top { display:flex; gap:0.6rem; align-items:center; }
  .entry-nom { flex:1; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.08); color:var(--parchment); font-family:'Crimson Text',serif; font-weight:600; font-size:0.95rem; padding:0.15rem 0.1rem; }
  .entry-nom:focus { outline:none; border-bottom-color:var(--GLD); }
  .entry-nom::placeholder { color:var(--SUB); opacity:0.55; }
  .entry-del { flex-shrink:0; width:26px; height:26px; border-radius:2px; background:rgba(139,26,26,0.14); border:1px solid rgba(139,26,26,0.32); color:#c07070; cursor:pointer; font-size:0.95rem; line-height:1; transition:all 0.15s; }
  .entry-del:hover { background:rgba(139,26,26,0.3); }
  .entry-desc { width:100%; margin-top:0.5rem; background:transparent; border:none; color:var(--parchment-dark); font-family:'Crimson Text',serif; font-size:0.86rem; line-height:1.5; resize:vertical; min-height:20px; padding:0.1rem; }
  .entry-desc:focus { outline:none; }
  .entry-desc::placeholder { color:var(--SUB); opacity:0.6; font-style:italic; }
  .add-btn { margin-top:0.9rem; background:rgba(184,146,42,0.1); border:1px dashed rgba(184,146,42,0.35); color:var(--GLD-LT); font-family:'Cinzel',serif; font-size:0.66rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.55rem 1rem; border-radius:2px; cursor:pointer; width:100%; transition:all 0.15s; }
  .add-btn:hover { background:rgba(184,146,42,0.2); border-color:rgba(184,146,42,0.55); }
  .empty-hint { color:var(--SUB); font-style:italic; font-size:0.85rem; padding:0.3rem 0; }

  /* ---- Échelons : compétences / talents / possessions par palier ---- */
  .echelon-head { display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap; padding-bottom:0.6rem; margin-bottom:0.4rem; border-bottom:1px solid rgba(184,146,42,0.28); }
  .echelon-label { font-family:'Cinzel',serif; font-size:0.9rem; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--GLD-LT); }
  .statut-zone { margin-left:auto; display:flex; align-items:center; gap:0.4rem; }
  .statut-lbl { font-family:'Cinzel',serif; font-size:0.56rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--SUB); }
  .statut-tier, .statut-rang { background:rgba(9,8,12,0.5); border:1px solid rgba(184,146,42,0.3); color:var(--parchment); font-family:'Crimson Text',serif; font-size:0.85rem; padding:0.25rem 0.4rem; border-radius:2px; }
  .statut-tier:focus, .statut-rang:focus { outline:none; border-color:var(--GLD); }
  .statut-rang { width:3.4rem; text-align:center; }
  .statut-print { display:none; font-family:'Crimson Text',serif; font-style:italic; color:var(--parchment); }
  .sub { margin-top:1.3rem; }
  .sub-title { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--VIO2); margin-bottom:0.6rem; }

  .alerte { display:none; background:rgba(139,26,26,0.15); border:1px solid rgba(139,26,26,0.4); color:#e0a0a0; padding:0.6rem 0.9rem; border-radius:2px; margin-top:1rem; font-size:0.85rem; }
  .footnote { text-align:center; color:var(--SUB); font-size:0.72rem; font-style:italic; margin-top:2.5rem; opacity:0.8; }

  /* ---- Impression / export PDF : version claire pour le joueur ---- */
  @media print {
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    @page { margin:14mm; }
    nav, .tool-btn, .sync-dot, .add-btn, .entry-del,
    .illus-btns, .illus-hint, .zone-hint, .footnote,
    .alerte, .empty-hint, .illus-empty { display:none !important; }
    body { background:#fff !important; color:#221c10; }
    body::before { display:none !important; }
    .layout { max-width:100%; margin:0; padding:0; }
    .carr-header { border-color:#c9b98a; padding-bottom:1rem; }
    .carr-eyebrow { color:#8a6d2a; }
    .titre-input { color:#2a2114; border:none; font-size:1.9rem; }
    .soustitre-input { color:#6b5320; border:none; margin-top:0.3rem; }
    .desc-input { color:#2a2416; border:none; padding:0; min-height:0; resize:none; margin-top:0.7rem; }
    .illus-frame { border-color:#c9b98a; background:#faf6ea !important; }
    .card { background:#fff; border:1px solid #d8caa0; margin-top:1rem; break-inside:avoid; }
    .card-title { color:#8a6d2a; }
    .card-title::after { background:#e0d4ab; }
    .carac-chip { display:none !important; }
    .carac-chip.on { display:inline-block !important; background:#f3ecd6 !important; border-color:#b8922a; color:#2a2114; box-shadow:none; }
    .entry { border-color:#d8caa0; border-left-color:#b8922a; background:#fff; break-inside:avoid; }
    .entry-nom { color:#2a2114; border:none; font-weight:600; }
    .entry-desc { color:#332b18; }
    .echelon-head { color:#8a6d2a; border-color:#d8caa0; }
    .echelon-label { color:#8a6d2a; }
    .statut-lbl { color:#6b5320; }
    .statut-tier, .statut-rang { display:none !important; }

  }
</style>

<body>

<nav>
  <a href="carrieres.html" class="nav-back">◂ Les carrières</a>
  <a href="index.html">Accueil</a>
  <span class="nav-sep">·</span>
  <span class="nav-current">Carrière</span>
  <button class="tool-btn" id="export-pdf" type="button">⭳ Exporter en PDF</button>
  <div class="sync-dot" id="sync"><span class="pip"></span><span id="sync-txt">connexion…</span></div>
</nav>

<div class="layout">

  <!-- EN-TÊTE : titre + illustration -->
  <div class="carr-header">
    <div class="carr-illus">
      <div class="illus-frame" id="illus-frame">
        <div class="illus-empty" id="illus-empty">Aucune illustration.<br>Ajoutez une image.</div>
        <img id="illus-img" style="display:none" alt="Illustration de la carrière">
      </div>
      <div class="illus-btns">
        <label for="illus-file">Ajouter</label>
        <button type="button" id="illus-remove">Retirer</button>
      </div>
      <input type="file" id="illus-file" accept="image/*">
      <div class="illus-hint">Redimensionnée automatiquement, stockée avec la carrière (pas de fichier à téléverser sur GitHub).</div>
    </div>

    <div class="carr-title-zone">
      <div class="carr-eyebrow">Carrière · Warhammer Fantasy 4e</div>
      <input class="titre-input" id="f-titre" placeholder="Nom de la carrière">
      <input class="soustitre-input" id="f-soustitre" placeholder="Classe, espèces autorisées, statut…">
      <textarea class="desc-input" id="f-description" placeholder="Description de la carrière : son rôle, son ambiance, sa place dans le Vieux Monde, les opportunités d'aventure…"></textarea>
    </div>
  </div>

  <div class="alerte" id="alerte"></div>

  <!-- COMPÉTENCES / TALENTS / POSSESSIONS, par échelon -->
  <div id="echelons-zone"></div>

  <div class="footnote" id="foot">Enregistrement automatique · synchronisé en temps réel</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ---------- Identifiant de la carrière ----------
// Priorité au paramètre ?c=<clé> (créé depuis l'accueil). Sinon, nom du fichier.
const cParam = new URLSearchParams(location.search).get('c');
let slug;
if (cParam) {
  // clé Firebase (sensible à la casse) : on retire seulement les caractères interdits
  slug = cParam.replace(/[.#$/\[\]\s]/g, '').slice(0, 128);
} else {
  const fichier = (location.pathname.split('/').pop() || '').replace(/\.html?$/i, '');
  slug = (fichier || 'carriere-template').replace(/[^a-z0-9_-]/gi, '').toLowerCase();
}
if (!slug) slug = 'carriere-template';

// ---------- Firebase ----------
let db = null, refCarr = null;
const cfg = window.FIREBASE_CONFIG || {};
try {
  const app = initializeApp(cfg);
  db = getDatabase(app);
  refCarr = ref(db, `carrieres/${slug}`);
} catch (e) {
  montrerAlerte("Firebase indisponible : " + e.message + ". Les modifications ne seront pas synchronisées.");
}

// ---------- État ----------
const CARACS = ['CC','CT','F','E','I','Ag','Dex','Int','FM','Soc'];
const ECHELONS = [1,2,3,4];

// ---------- Export PDF (impression du navigateur -> Enregistrer en PDF) ----------
document.getElementById('export-pdf').addEventListener('click', () => window.print());

let state = {
  titre:'', soustitre:'', description:'', image:'',
  schema:{},              // { CC:[false,false,false,false], ... }
  echelons:[]             // 4 paliers : [{ competences:[], talents:[], possessions:[] }, ...]
};
CARACS.forEach(c => state.schema[c] = [false,false,false,false]);
for (let i = 0; i < 4; i++) state.echelons.push({ stTier:'', stRang:'', competences:[], talents:[], possessions:[] });

// Types de listes présents dans chaque échelon
const TYPES = [
  { key:'competences', label:'Compétences', article:'une', singulier:'compétence', vide:'Aucune compétence à cet échelon.' },
  { key:'talents',     label:'Talents',     article:'un',  singulier:'talent',     vide:'Aucun talent à cet échelon.' },
  { key:'possessions', label:'Possessions', article:'une', singulier:'possession', vide:'Aucune possession à cet échelon.' }
];

function normaliser(d) {
  d = d || {};
  const s = {
    titre: d.titre || '', soustitre: d.soustitre || '', description: d.description || '',
    image: d.image || '', schema: {}, echelons: []
  };
  CARACS.forEach(c => {
    const src = (d.schema && d.schema[c]) || [];
    s.schema[c] = [0,1,2,3].map(i => !!src[i]);
  });
  const nettoie = (arr) => (Array.isArray(arr) ? arr : [])
    .map(e => ({ nom:(e && e.nom) || '', desc:(e && e.desc) || '' }));
  for (let i = 0; i < 4; i++) {
    const src = (Array.isArray(d.echelons) && d.echelons[i]) ? d.echelons[i] : {};
    s.echelons.push({
      stTier: (typeof src.stTier === 'string') ? src.stTier : '',
      stRang: (src.stRang === 0 || src.stRang) ? String(src.stRang) : '',
      competences: nettoie(src.competences),
      talents: nettoie(src.talents),
      possessions: nettoie(src.possessions)
    });
  }
  // Rétrocompatibilité : ancien format (compétences/talents à plat) -> échelon 1
  if (!Array.isArray(d.echelons)) {
    if (Array.isArray(d.competences)) s.echelons[0].competences = nettoie(d.competences);
    if (Array.isArray(d.talents))     s.echelons[0].talents = nettoie(d.talents);
  }
  return s;
}

// ---------- Sync ----------
let dernierEcrit = '';    // JSON de ce qu'on a envoyé, pour ignorer l'écho
let hydrate = false;

function jsonState() { return JSON.stringify(state); }

const sync = document.getElementById('sync');
const syncTxt = document.getElementById('sync-txt');
function setSync(cls, txt) { sync.className = 'sync-dot ' + cls; syncTxt.textContent = txt; }

let tSave = null;
function programmerSauvegarde() {
  if (!refCarr) return;
  setSync('save', 'enregistrement…');
  clearTimeout(tSave);
  tSave = setTimeout(sauvegarder, 400);
}
function sauvegarder() {
  if (!refCarr) return;
  const payload = JSON.parse(jsonState());
  dernierEcrit = JSON.stringify(payload);
  update(refCarr, payload)
    .then(() => setSync('ok', 'à jour'))
    .catch(e => setSync('err', 'erreur : ' + e.message));
}

function unInputEstActif() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
}

if (refCarr) {
  onValue(refCarr, (snap) => {
    const distant = snap.val();
    const distantJson = JSON.stringify(normaliser(distant));
    // ignore l'écho de notre propre écriture
    if (distantJson === dernierEcrit) { setSync('ok', 'à jour'); return; }
    // ne pas écraser pendant qu'on tape
    if (hydrate && unInputEstActif() && distantJson !== jsonState()) { return; }
    state = normaliser(distant);
    rendreTout();
    hydrate = true;
    setSync('ok', 'à jour');
  }, (e) => setSync('err', 'hors ligne'));
} else {
  rendreTout();
}

// ---------- Rendu ----------
function rendreTout() {
  document.getElementById('f-titre').value = state.titre;
  document.getElementById('f-soustitre').value = state.soustitre;
  const dsc = document.getElementById('f-description');
  dsc.value = state.description; autoGrow(dsc);
  rendreImage();
  if (!squeletteFait) construireSquelette();
  ECHELONS.forEach((ech, ei) => TYPES.forEach(t => rendreListe(ei, t.key)));
  appliquerSchema();
  appliquerStatuts();
  document.title = (state.titre ? state.titre + ' — ' : '') + 'Carrière · Warhammer';
}

function rendreImage() {
  const img = document.getElementById('illus-img');
  const empty = document.getElementById('illus-empty');
  if (state.image) { img.src = state.image; img.style.display = 'block'; empty.style.display = 'none'; }
  else { img.removeAttribute('src'); img.style.display = 'none'; empty.style.display = 'block'; }
}

function appliquerSchema() {
  CARACS.forEach(c => ECHELONS.forEach((ech, ei) => {
    const chip = document.querySelector('.carac-chip[data-c="' + c + '"][data-e="' + ei + '"]');
    if (chip) chip.classList.toggle('on', !!state.schema[c][ei]);
  }));
}

let squeletteFait = false;

// Construit les 4 cartes d'échelon (une fois), avec leurs sous-listes et boutons d'ajout.
function construireSquelette() {
  const zone = document.getElementById('echelons-zone');
  zone.innerHTML = '';
  const hint = document.createElement('div');
  hint.className = 'zone-hint';
  hint.textContent = "Chaque échelon regroupe son statut, ses caractéristiques qui progressent, ses compétences, talents et possessions. Cliquez une caractéristique pour l'activer à cet échelon.";
  zone.appendChild(hint);
  ECHELONS.forEach((ech, ei) => {
    const card = document.createElement('div');
    card.className = 'card echelon-card';
    card.id = 'echelon-card-' + ei;
    let html =
      '<div class="echelon-head">' +
        '<span class="echelon-label">Échelon ' + ech + '</span>' +
        '<span class="statut-zone">' +
          '<span class="statut-lbl">Statut</span>' +
          '<select class="statut-tier" id="st-tier-' + ei + '">' +
            '<option value="">—</option>' +
            '<option value="Bronze">Bronze</option>' +
            '<option value="Argent">Argent</option>' +
            '<option value="Or">Or</option>' +
          '</select>' +
          '<input class="statut-rang" id="st-rang-' + ei + '" type="number" min="0" placeholder="0">' +
          '<span class="statut-print" id="st-print-' + ei + '"></span>' +
        '</span>' +
      '</div>';
    html +=
      '<div class="sub sub-schema" id="sub-schema-' + ei + '">' +
        '<div class="sub-title">Caractéristiques qui progressent</div>' +
        '<div class="carac-row" id="schema-e' + ei + '">' +
          CARACS.map(c => '<span class="carac-chip" data-c="' + c + '" data-e="' + ei + '">' + c + '</span>').join('') +
        '</div>' +
      '</div>';
    TYPES.forEach(t => {
      html +=
        '<div class="sub">' +
          '<div class="sub-title">' + t.label + '</div>' +
          '<div class="entry-list" id="list-e' + ei + '-' + t.key + '"></div>' +
          '<button class="add-btn" data-ech="' + ei + '" data-type="' + t.key + '">+ Ajouter ' + t.article + ' ' + t.singulier + '</button>' +
        '</div>';
    });
    card.innerHTML = html;
    zone.appendChild(card);
  });
  zone.querySelectorAll('.carac-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const c = chip.dataset.c, ei = +chip.dataset.e;
      state.schema[c][ei] = !state.schema[c][ei];
      chip.classList.toggle('on', state.schema[c][ei]);
      majEtatsVides();
      programmerSauvegarde();
    });
  });
  zone.querySelectorAll('.add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ei = +btn.dataset.ech, type = btn.dataset.type;
      state.echelons[ei][type].push({ nom:'', desc:'' });
      rendreListe(ei, type);
      programmerSauvegarde();
      const inputs = document.querySelectorAll('#list-e' + ei + '-' + type + ' .entry-nom');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });
  });
  ECHELONS.forEach((ech, ei) => {
    const tier = document.getElementById('st-tier-' + ei);
    const rang = document.getElementById('st-rang-' + ei);
    const maj = () => {
      state.echelons[ei].stTier = tier.value;
      state.echelons[ei].stRang = rang.value;
      majStatutPrint(ei);
      majEtatsVides();
      programmerSauvegarde();
    };
    tier.addEventListener('change', maj);
    rang.addEventListener('input', maj);
  });
  squeletteFait = true;
}

function rendreListe(ei, type) {
  const cont = document.getElementById('list-e' + ei + '-' + type);
  if (!cont) return;
  const items = state.echelons[ei][type];
  const meta = TYPES.find(t => t.key === type);
  cont.innerHTML = '';
  if (!items.length) {
    cont.innerHTML = '<div class="empty-hint">' + meta.vide + '</div>';
    majEtatsVides();
    return;
  }
  items.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'entry';
    const ph = (type === 'possessions')
      ? 'Quantité, détail, état…'
      : 'Description, spécialisation, condition d\'acquisition…';
    row.innerHTML =
      '<div class="entry-top">' +
        '<input class="entry-nom" placeholder="Nom">' +
        '<button class="entry-del" title="Supprimer">×</button>' +
      '</div>' +
      '<textarea class="entry-desc" placeholder="' + ph + '"></textarea>';
    const nom = row.querySelector('.entry-nom');
    const desc = row.querySelector('.entry-desc');
    nom.value = e.nom; desc.value = e.desc;
    nom.addEventListener('input', () => { state.echelons[ei][type][i].nom = nom.value; programmerSauvegarde(); });
    desc.addEventListener('input', () => { state.echelons[ei][type][i].desc = desc.value; autoGrow(desc); programmerSauvegarde(); });
    row.querySelector('.entry-del').addEventListener('click', () => {
      state.echelons[ei][type].splice(i, 1); rendreListe(ei, type); programmerSauvegarde();
    });
    cont.appendChild(row);
    autoGrow(desc);
  });
  majEtatsVides();
}

// Met à jour le texte de statut affiché à l'impression pour un échelon.
function majStatutPrint(ei) {
  const el = document.getElementById('st-print-' + ei);
  if (!el) return;
  const t = state.echelons[ei].stTier, r = state.echelons[ei].stRang;
  const txt = (t || (r !== '' && r != null)) ? ((t || '') + ((r !== '' && r != null) ? ' ' + r : '')).trim() : '—';
  el.textContent = txt;
}

// Applique les valeurs de statut aux contrôles (au chargement / à la synchro).
function appliquerStatuts() {
  ECHELONS.forEach((ech, ei) => {
    const tier = document.getElementById('st-tier-' + ei);
    const rang = document.getElementById('st-rang-' + ei);
    if (tier) tier.value = state.echelons[ei].stTier || '';
    if (rang) rang.value = state.echelons[ei].stRang || '';
    majStatutPrint(ei);
  });
}

// Marque les sous-sections et échelons vides (utile pour l'export PDF, qui les masque).
function majEtatsVides() {
  ECHELONS.forEach((ech, ei) => {
    const caracVide = CARACS.every(c => !state.schema[c][ei]);
    let cardVide = !(state.echelons[ei].stTier || state.echelons[ei].stRang) && caracVide;
    const subSch = document.getElementById('sub-schema-' + ei);
    if (subSch) subSch.classList.toggle('sub-empty', caracVide);
    TYPES.forEach(t => {
      const cont = document.getElementById('list-e' + ei + '-' + t.key);
      if (!cont) return;
      const vide = state.echelons[ei][t.key].length === 0;
      const sub = cont.closest('.sub');
      if (sub) sub.classList.toggle('sub-empty', vide);
      if (!vide) cardVide = false;
    });
    const card = document.getElementById('echelon-card-' + ei);
    if (card) card.classList.toggle('echelon-empty', cardVide);
  });
}

function autoGrow(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }

// ---------- Champs texte ----------
document.getElementById('f-titre').addEventListener('input', function () {
  state.titre = this.value; document.title = (this.value ? this.value + ' — ' : '') + 'Carrière · Warhammer'; programmerSauvegarde();
});
document.getElementById('f-soustitre').addEventListener('input', function () { state.soustitre = this.value; programmerSauvegarde(); });
document.getElementById('f-description').addEventListener('input', function () { state.description = this.value; autoGrow(this); programmerSauvegarde(); });

// ---------- Ajout d'entrées ----------
// Les boutons « + Ajouter » sont créés par échelon dans construireSquelette().

// ---------- Image : upload + redimensionnement ----------
document.getElementById('illus-file').addEventListener('change', function (ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      const MAX = 1000;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) { const r = Math.min(MAX / w, MAX / h); w = Math.round(w * r); h = Math.round(h * r); }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const data = cv.toDataURL('image/jpeg', 0.82);
      const ko = Math.round(data.length / 1024);
      if (ko > 900) montrerAlerte("Image assez lourde (" + ko + " Ko). Elle fonctionnera, mais une image plus petite se synchronise plus vite.");
      else masquerAlerte();
      state.image = data;
      rendreImage();
      programmerSauvegarde();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = '';
});
document.getElementById('illus-remove').addEventListener('click', () => {
  state.image = ''; rendreImage(); masquerAlerte(); programmerSauvegarde();
});

// ---------- Alertes ----------
function montrerAlerte(msg) { const a = document.getElementById('alerte'); a.textContent = msg; a.style.display = 'block'; }
function masquerAlerte() { document.getElementById('alerte').style.display = 'none'; }

// premier rendu (avant la première réponse Firebase)
rendreTout();
</script>
