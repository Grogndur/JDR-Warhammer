<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Navigation Mobile</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#eee; font-family:sans-serif; }

.topbar { position:fixed; top:0; left:0; right:0; height:48px; background:#1a1a2e; display:flex; align-items:center; padding:0 1rem; gap:1rem; z-index:300; }
.btn-menu { background:#b8922a; border:none; color:#000; padding:0.4rem 0.8rem; cursor:pointer; font-size:1rem; border-radius:4px; }

.sidebar { position:fixed; top:48px; left:0; bottom:0; width:260px; background:#1a1a2e; z-index:250; transform:translateX(-100%); transition:transform 0.3s; overflow-y:auto; }
.sidebar.open { transform:translateX(0); }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; }
.overlay.visible { display:block; }

.nav-btn { display:block; width:100%; background:none; border:none; color:#b8922a; text-align:left; padding:1rem 1.5rem; font-size:1rem; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.1); }
.nav-btn:active { background:rgba(184,146,42,0.2); }

.main { margin-top:48px; padding:2rem; }
.content { display:none; }
.content.active { display:block; }

#log { margin-top:1rem; padding:1rem; background:#222; border-radius:4px; font-size:0.85rem; color:#0f0; font-family:monospace; min-height:100px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-menu" onclick="toggleSidebar()">☰ Menu</button>
  <span style="color:#b8922a;font-size:0.9rem;">Test Navigation Mobile</span>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <button class="nav-btn" onclick="showContent('a')">Section A</button>
  <button class="nav-btn" onclick="showContent('b')">Section B</button>
  <button class="nav-btn" onclick="showContent('c')">Section C</button>
</div>

<div class="main">
  <div class="content active" id="content-a">
    <h2 style="color:#b8922a;">Section A</h2>
    <p style="margin-top:1rem;color:#aaa;">Contenu de la section A. Si tu vois ceci après avoir cliqué "Section A" dans le menu, la navigation fonctionne.</p>
  </div>
  <div class="content" id="content-b">
    <h2 style="color:#674EA7;">Section B</h2>
    <p style="margin-top:1rem;color:#aaa;">Contenu de la section B.</p>
  </div>
  <div class="content" id="content-c">
    <h2 style="color:#5E804F;">Section C</h2>
    <p style="margin-top:1rem;color:#aaa;">Contenu de la section C.</p>
  </div>

  <div id="log">En attente d'interactions...<br></div>
</div>

<script>
function log(msg) {
  var el = document.getElementById('log');
  el.innerHTML += new Date().toLocaleTimeString() + ' — ' + msg + '<br>';
}

function toggleSidebar() {
  log('toggleSidebar appelé');
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}

function closeSidebar() {
  log('closeSidebar appelé');
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function showContent(id) {
  log('showContent(' + id + ') appelé');
  document.querySelectorAll('.content').forEach(function(el) {
    el.classList.remove('active');
  });
  document.getElementById('content-' + id).classList.add('active');
  closeSidebar();
}

log('Page chargée — ' + navigator.userAgent.substring(0, 60));
</script>
</body>
</html>
