<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Combat — L'Éclipse</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a0a0f; --ink2:#0f0f18; --parchment:#f0e8d8; --parchment-dark:#d4c8a8;
  --GLD:#B8922A; --VIO:#674EA7; --VIO2:#9b7fd4; --GRN:#5E804F; --SUB:#555566;
  --red:#8b1a1a; --red2:#c0392b; --orange:#c0702a;
  --active:#B8922A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--ink); color:var(--parchment); font-family:'Crimson Text',serif; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 0%, rgba(139,26,26,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 100%, rgba(28,58,90,0.1) 0%, transparent 50%),
              repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px);
  pointer-events:none; z-index:0; }

/* NAV */
nav { position:sticky; top:0; z-index:200; background:rgba(10,10,15,0.96); backdrop-filter:blur(10px); border-bottom:1px solid rgba(139,26,26,0.3); padding:0.55rem 1.5rem; display:flex; align-items:center; gap:1rem; }
nav a { color:var(--SUB); text-decoration:none; font-size:0.8rem; font-style:italic; transition:color 0.2s; }
nav a:hover { color:var(--GLD); }
.nav-sep { color:var(--SUB); opacity:0.3; }
.nav-current { color:#c07070 !important; font-style:normal; font-family:'Cinzel',serif; font-size:0.8rem; }
.round-display { margin-left:auto; display:flex; align-items:center; gap:0.75rem; }
.round-label { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--SUB); }
.round-num { font-family:'Cinzel',serif; font-size:1.4rem; color:var(--GLD); line-height:1; }
.round-btns { display:flex; gap:0.3rem; }
.round-btn { background:rgba(184,146,42,0.1); border:1px solid rgba(184,146,42,0.25); color:var(--GLD); width:26px; height:26px; border-radius:2px; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.round-btn:hover { background:rgba(184,146,42,0.25); }

/* LAYOUT */
.layout { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:1rem; display:grid; grid-template-columns:1fr 340px; gap:1rem; align-items:start; }
@media(max-width:800px){ .layout { grid-template-columns:1fr; } }

/* COMBAT ZONE */
.combat-zone { display:flex; flex-direction:column; gap:0.5rem; }

/* COMBATANT CARD */
.combatant {
  background:rgba(10,10,15,0.75); border:1px solid rgba(255,255,255,0.07);
  border-radius:2px; overflow:hidden; transition:all 0.2s;
  position:relative;
}
.combatant.active-turn {
  border-color:rgba(184,146,42,0.6);
  box-shadow: 0 0 0 1px rgba(184,146,42,0.2), inset 3px 0 0 var(--GLD);
}
.combatant.is-pj { border-left:3px solid transparent; }
.combatant.is-pj.pj-sareth { border-left-color:var(--VIO2); }
.combatant.is-pj.pj-den    { border-left-color:var(--GRN); }
.combatant.is-pj.pj-azart  { border-left-color:var(--GLD); }
.combatant.is-dead { opacity:0.35; filter:grayscale(0.6); }

/* COMBATANT HEADER */
.comb-header { display:flex; align-items:center; gap:0.75rem; padding:0.65rem 0.85rem; cursor:pointer; user-select:none; }
.comb-init { font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700; color:var(--GLD); min-width:32px; text-align:center; }
.comb-name { font-family:'Cinzel',serif; font-size:0.95rem; font-weight:600; flex:1; }
.comb-type { font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--SUB); }

/* BLESSURES MINI */
.comb-wounds-mini { display:flex; align-items:center; gap:0.4rem; }
.wounds-bar-wrap { width:80px; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.wounds-bar { height:100%; border-radius:3px; transition:width 0.3s, background 0.3s; }
.wounds-text { font-family:'Cinzel',serif; font-size:0.78rem; color:var(--parchment-dark); white-space:nowrap; }

/* ÉTATS MINI */
.etats-mini { display:flex; gap:0.25rem; flex-wrap:wrap; }
.etat-badge { font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; padding:0.1rem 0.35rem; border-radius:2px; font-family:'Cinzel',serif; }
.etat-sonne    { background:rgba(184,146,42,0.2); color:var(--GLD); border:1px solid rgba(184,146,42,0.3); }
.etat-extenue  { background:rgba(139,26,26,0.2); color:#e08080; border:1px solid rgba(139,26,26,0.3); }
.etat-aterre   { background:rgba(28,58,90,0.3); color:#8bbcee; border:1px solid rgba(28,58,90,0.5); }
.etat-inconscient { background:rgba(50,20,70,0.4); color:var(--VIO2); border:1px solid rgba(103,78,167,0.4); }
.etat-mort     { background:rgba(80,0,0,0.4); color:#e05050; border:1px solid rgba(139,26,26,0.5); }
.etat-custom   { background:rgba(94,128,79,0.2); color:var(--GRN); border:1px solid rgba(94,128,79,0.3); }

/* CTRL DROITE HEADER */
.comb-ctrl { display:flex; align-items:center; gap:0.4rem; }
.comb-turn-btn { background:rgba(184,146,42,0.1); border:1px solid rgba(184,146,42,0.2); color:var(--GLD); font-size:0.65rem; font-family:'Cinzel',serif; letter-spacing:0.08em; padding:0.2rem 0.5rem; border-radius:2px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.comb-turn-btn:hover { background:rgba(184,146,42,0.25); }
.comb-turn-btn.is-active { background:rgba(184,146,42,0.3); border-color:rgba(184,146,42,0.6); }
.comb-del { background:none; border:none; color:rgba(139,26,26,0.4); cursor:pointer; font-size:0.85rem; transition:color 0.15s; padding:0.1rem 0.3rem; }
.comb-del:hover { color:#e05050; }
.comb-expand { background:none; border:none; color:var(--SUB); cursor:pointer; font-size:0.75rem; padding:0.1rem 0.3rem; transition:all 0.15s; }
.comb-expand:hover { color:var(--parchment-dark); }

/* FICHE DÉPLIABLE (PNJ) */
.comb-body { display:none; padding:0.75rem 0.85rem 0.85rem; border-top:1px solid rgba(255,255,255,0.05); background:rgba(0,0,0,0.2); }
.combatant.open .comb-body { display:block; }
.comb-body-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }

/* STATS PNJ */
.stat-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.6rem; }
.stat-chip { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:2px; padding:0.25rem 0.5rem; text-align:center; min-width:48px; }
.stat-chip-label { font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--SUB); display:block; }
.stat-chip-val { font-family:'Cinzel',serif; font-size:0.95rem; color:var(--parchment); }

/* BLESSURES CONTROL */
.wounds-ctrl { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.6rem; }
.wounds-label { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--SUB); width:60px; }
.wounds-current { font-family:'Cinzel',serif; font-size:1.3rem; line-height:1; min-width:28px; text-align:center; }
.wounds-sep { color:var(--SUB); font-size:0.9rem; }
.wounds-max-val { font-size:0.85rem; color:var(--SUB); }
.btn-w { width:28px; height:28px; border-radius:2px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all 0.15s; }
.btn-dmg { background:rgba(139,26,26,0.2); border:1px solid rgba(139,26,26,0.4); color:#e08080; }
.btn-dmg:hover { background:rgba(139,26,26,0.4); }
.btn-heal { background:rgba(94,128,79,0.15); border:1px solid rgba(94,128,79,0.35); color:var(--GRN); }
.btn-heal:hover { background:rgba(94,128,79,0.3); }
.wounds-input { background:transparent; border:none; color:var(--parchment); font-family:'Cinzel',serif; font-size:1.3rem; width:36px; text-align:center; }
.wounds-input:focus { outline:none; }

/* ÉTATS */
.etats-section { margin-bottom:0.6rem; }
.etats-label { font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--SUB); margin-bottom:0.35rem; display:block; }
.etats-buttons { display:flex; gap:0.3rem; flex-wrap:wrap; }
.etat-btn { font-size:0.62rem; letter-spacing:0.07em; text-transform:uppercase; padding:0.2rem 0.5rem; border-radius:2px; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--SUB); font-family:'Cinzel',serif; transition:all 0.15s; }
.etat-btn:hover { color:var(--parchment-dark); border-color:rgba(255,255,255,0.2); }
.etat-btn.on.sonne      { background:rgba(184,146,42,0.25); border-color:rgba(184,146,42,0.5); color:var(--GLD); }
.etat-btn.on.extenue    { background:rgba(139,26,26,0.25); border-color:rgba(139,26,26,0.5); color:#e08080; }
.etat-btn.on.aterre     { background:rgba(28,58,90,0.35); border-color:rgba(28,58,90,0.6); color:#8bbcee; }
.etat-btn.on.inconscient{ background:rgba(103,78,167,0.25); border-color:rgba(103,78,167,0.5); color:var(--VIO2); }
.etat-btn.on.mort       { background:rgba(80,0,0,0.4); border-color:rgba(139,26,26,0.6); color:#e05050; }

.notes-inline { width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.07); border-radius:2px; color:var(--parchment-dark); font-family:'Crimson Text',serif; font-size:0.85rem; padding:0.4rem 0.5rem; resize:none; min-height:50px; line-height:1.4; }
.notes-inline:focus { outline:none; border-color:rgba(184,146,42,0.3); }

/* PANNEAU DROIT */
.side-panel { display:flex; flex-direction:column; gap:0.75rem; }
.panel-card { background:rgba(10,10,15,0.75); border:1px solid rgba(255,255,255,0.07); border-radius:2px; padding:0.9rem; }
.panel-title { font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--SUB); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
.panel-title::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.05); }
.panel-title.red { color:#c07070; }
.panel-title.gld { color:var(--GLD); }

/* FORMULAIRE AJOUT */
.add-form { display:flex; flex-direction:column; gap:0.5rem; }
.form-row { display:flex; gap:0.4rem; flex-wrap:wrap; }
.f-input { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:2px; color:var(--parchment); font-family:'Crimson Text',serif; font-size:0.88rem; padding:0.35rem 0.5rem; flex:1; min-width:0; transition:border-color 0.15s; }
.f-input:focus { outline:none; border-color:rgba(184,146,42,0.4); }
.f-input::placeholder { color:var(--SUB); font-style:italic; }
.f-input.short { width:42px; flex:none; text-align:center; min-width:0; }
.f-label { font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--SUB); margin-bottom:0.15rem; display:block; }
.f-group { display:flex; flex-direction:column; flex:1; }
.add-btn { background:rgba(139,26,26,0.2); border:1px solid rgba(139,26,26,0.4); color:#e08080; font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.45rem; border-radius:2px; cursor:pointer; transition:all 0.15s; width:100%; margin-top:0.25rem; }
.add-btn:hover { background:rgba(139,26,26,0.35); }
.add-btn.pj-btn { background:rgba(94,128,79,0.15); border-color:rgba(94,128,79,0.35); color:var(--GRN); }
.add-btn.pj-btn:hover { background:rgba(94,128,79,0.28); }

/* SÉPARATEUR PJ */
.pj-quick { display:flex; flex-direction:column; gap:0.35rem; }
.pj-quick-btn { display:flex; align-items:center; gap:0.6rem; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:2px; padding:0.45rem 0.65rem; cursor:pointer; transition:all 0.15s; }
.pj-quick-btn:hover { border-color:rgba(184,146,42,0.3); background:rgba(255,255,255,0.05); }
.pj-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pj-btn-name { font-family:'Cinzel',serif; font-size:0.82rem; flex:1; }
.pj-btn-sub { font-size:0.72rem; color:var(--SUB); font-style:italic; }
.pj-init-input { background:rgba(184,146,42,0.08); border:1px solid rgba(184,146,42,0.2); border-radius:2px; color:var(--GLD); font-family:'Cinzel',serif; font-size:0.9rem; width:40px; text-align:center; padding:0.15rem; }
.pj-init-input:focus { outline:none; border-color:rgba(184,146,42,0.5); }

/* ACTIONS GLOBALES */
.actions-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; }
.action-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:var(--SUB); font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.45rem; border-radius:2px; cursor:pointer; transition:all 0.15s; text-align:center; }
.action-btn:hover { border-color:rgba(184,146,42,0.3); color:var(--parchment-dark); }
.action-btn.danger { border-color:rgba(139,26,26,0.3); color:#c07070; }
.action-btn.danger:hover { background:rgba(139,26,26,0.15); border-color:rgba(139,26,26,0.5); }

/* NEXT TURN BUTTON */
.next-turn-btn { width:100%; background:rgba(184,146,42,0.12); border:1px solid rgba(184,146,42,0.35); color:var(--GLD); font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.15em; text-transform:uppercase; padding:0.65rem; border-radius:2px; cursor:pointer; transition:all 0.2s; }
.next-turn-btn:hover { background:rgba(184,146,42,0.25); box-shadow:0 0 12px rgba(184,146,42,0.15); }

/* EMPTY STATE */
.empty-state { text-align:center; padding:2.5rem 1rem; color:var(--SUB); font-style:italic; font-size:0.9rem; border:1px dashed rgba(255,255,255,0.06); border-radius:2px; }

/* TYPE TAG */
.type-enemi  { color:#e08080; }
.type-allie  { color:var(--GRN); }
.type-neutre { color:var(--SUB); }

/* FLÈCHE TOUR ACTIF */
.combatant.active-turn .comb-name::before { content:'▶ '; color:var(--GLD); font-size:0.7rem; }
</style>
</head>
<body>

<nav>
  <a href="index.html">← Accueil</a>
  <span class="nav-sep">·</span>
  <span class="nav-current">Tracker Combat</span>
  <div class="round-display">
    <span class="round-label">Round</span>
    <span class="round-num" id="round-num">1</span>
    <div class="round-btns">
      <button class="round-btn" onclick="changeRound(-1)">−</button>
      <button class="round-btn" onclick="changeRound(1)">+</button>
    </div>
  </div>
</nav>

<div class="layout">

  <!-- ZONE COMBAT -->
  <div>
    <div class="combat-zone" id="combat-zone">
      <div class="empty-state" id="empty-msg">Aucun combattant — ajoute des PNJ ou des PJ ci-contre.</div>
    </div>
    <div style="margin-top:0.75rem;">
      <button class="next-turn-btn" onclick="nextTurn()">⬡ Tour suivant</button>
    </div>
  </div>

  <!-- PANNEAU DROIT -->
  <div class="side-panel">

    <!-- PJ RAPIDES -->
    <div class="panel-card">
      <div class="panel-title gld">Ajouter un PJ</div>
      <div class="pj-quick">
        <div class="pj-quick-btn" onclick="addPJ('Sareth','Cassandra','Sorcière · Demi-Elfe',14,'sareth')">
          <div class="pj-dot" style="background:var(--VIO2);"></div>
          <div style="flex:1;">
            <div class="pj-btn-name">Sareth</div>
            <div class="pj-btn-sub">Cassandra · 14 Blessures</div>
          </div>
          <input class="pj-init-input" id="init-sareth" type="number" value="33" min="1" max="99" onclick="event.stopPropagation()" placeholder="Ini">
        </div>
        <div class="pj-quick-btn" onclick="addPJ('Den\'l Endri','Séverine','Chasseuse · Elfe Sylvain',19,'den')">
          <div class="pj-dot" style="background:var(--GRN);"></div>
          <div style="flex:1;">
            <div class="pj-btn-name">Den'l Endri</div>
            <div class="pj-btn-sub">Séverine · 19 Blessures</div>
          </div>
          <input class="pj-init-input" id="init-den" type="number" value="53" min="1" max="99" onclick="event.stopPropagation()" placeholder="Ini">
        </div>
        <div class="pj-quick-btn" onclick="addPJ('Azart','Quentin','Voleur · Humain',12,'azart')">
          <div class="pj-dot" style="background:var(--GLD);"></div>
          <div style="flex:1;">
            <div class="pj-btn-name">Azart</div>
            <div class="pj-btn-sub">Quentin · 12 Blessures</div>
          </div>
          <input class="pj-init-input" id="init-azart" type="number" value="33" min="1" max="99" onclick="event.stopPropagation()" placeholder="Ini">
        </div>
      </div>
    </div>

    <!-- AJOUTER PNJ -->
    <div class="panel-card">
      <div class="panel-title red">Ajouter un PNJ / Créature</div>
      <div class="add-form">
        <div class="form-row">
          <div class="f-group">
            <span class="f-label">Nom</span>
            <input class="f-input" id="pnj-nom" type="text" placeholder="Goule, Garde, ...">
          </div>
          <div class="f-group" style="flex:none;width:56px;">
            <span class="f-label">Ini</span>
            <input class="f-input short" id="pnj-init" type="number" placeholder="30" min="1" max="99">
          </div>
        </div>
        <div class="form-row">
          <div class="f-group">
            <span class="f-label">Type</span>
            <select class="f-input" id="pnj-type">
              <option value="enemi">Ennemi</option>
              <option value="allie">Allié</option>
              <option value="neutre">Neutre</option>
            </select>
          </div>
          <div class="f-group" style="flex:none;width:70px;">
            <span class="f-label">Bless. max</span>
            <input class="f-input short" id="pnj-wounds" type="number" placeholder="10" min="1">
          </div>
        </div>
        <!-- Stats optionnelles -->
        <div style="font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--SUB);margin:0.1rem 0 0.3rem;">Stats (optionnel)</div>
        <div class="form-row">
          <div class="f-group"><span class="f-label">CC</span><input class="f-input short" id="pnj-cc" type="number" placeholder="—"></div>
          <div class="f-group"><span class="f-label">CT</span><input class="f-input short" id="pnj-ct" type="number" placeholder="—"></div>
          <div class="f-group"><span class="f-label">F</span><input class="f-input short" id="pnj-f" type="number" placeholder="—"></div>
          <div class="f-group"><span class="f-label">E</span><input class="f-input short" id="pnj-e" type="number" placeholder="—"></div>
          <div class="f-group"><span class="f-label">BF</span><input class="f-input short" id="pnj-bf" type="number" placeholder="—"></div>
          <div class="f-group"><span class="f-label">PA</span><input class="f-input short" id="pnj-pa" type="number" placeholder="0"></div>
        </div>
        <input class="f-input" id="pnj-notes" type="text" placeholder="Notes, capacités spéciales...">
        <button class="add-btn" onclick="addPNJ()">+ Ajouter au combat</button>
      </div>
    </div>

    <!-- ACTIONS GLOBALES -->
    <div class="panel-card">
      <div class="panel-title">Actions</div>
      <div class="actions-grid">
        <button class="action-btn" onclick="sortByInit()">↓ Trier par ini</button>
        <button class="action-btn" onclick="resetTurn()">⟳ Reset tour</button>
        <button class="action-btn" onclick="healAll()">♥ Soigner tous</button>
        <button class="action-btn danger" onclick="clearDead()">✕ Retirer morts</button>
        <button class="action-btn danger" style="grid-column:1/-1;" onclick="clearAll()">✕ Vider le combat</button>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════ STATE ══════════
let combatants = [];
let round = 1;
let activeTurnId = null;

const ETATS = [
  { key:'sonne',      label:'Sonné',       cls:'sonne' },
  { key:'extenue',    label:'Exténué',     cls:'extenue' },
  { key:'aterre',     label:'À terre',     cls:'aterre' },
  { key:'inconscient',label:'Inconscient', cls:'inconscient' },
  { key:'mort',       label:'Mort',        cls:'mort' },
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ══════════ ADD ══════════
function addPJ(nom, joueur, classe, wmax, pjKey) {
  const initEl = document.getElementById('init-' + pjKey);
  const init = parseInt(initEl?.value) || 33;
  if (combatants.find(c => c.pjKey === pjKey)) return; // déjà présent
  combatants.push({
    id: uid(), nom, joueur, classe,
    init, wounds: wmax, wmax,
    etats: {}, notes: '',
    isPJ: true, pjKey,
    stats: {}, type:'allie',
  });
  render();
}

function addPNJ() {
  const nom = document.getElementById('pnj-nom').value.trim();
  if (!nom) { document.getElementById('pnj-nom').focus(); return; }
  const init  = parseInt(document.getElementById('pnj-init').value) || 30;
  const wmax  = parseInt(document.getElementById('pnj-wounds').value) || 10;
  const type  = document.getElementById('pnj-type').value;
  const notes = document.getElementById('pnj-notes').value.trim();
  const stats = {};
  ['cc','ct','f','e','bf','pa'].forEach(k => {
    const v = document.getElementById('pnj-' + k).value;
    if (v !== '') stats[k] = parseInt(v);
  });
  combatants.push({ id:uid(), nom, init, wounds:wmax, wmax, etats:{}, notes, isPJ:false, stats, type });
  // reset form
  ['pnj-nom','pnj-init','pnj-wounds','pnj-notes','pnj-cc','pnj-ct','pnj-f','pnj-e','pnj-bf','pnj-pa'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('pnj-nom').focus();
  render();
}

// ══════════ RENDER ══════════
function render() {
  const zone = document.getElementById('combat-zone');
  const empty = document.getElementById('empty-msg');
  if (!combatants.length) {
    zone.innerHTML = '';
    zone.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  zone.innerHTML = '';
  combatants.forEach(c => zone.appendChild(makeCombatant(c)));
  document.getElementById('round-num').textContent = round;
}

function makeCombatant(c) {
  const div = document.createElement('div');
  div.className = 'combatant' + (c.isPJ ? ' is-pj pj-' + (c.pjKey||'') : '') + (c.id === activeTurnId ? ' active-turn' : '') + (c.etats.mort ? ' is-dead' : '');
  div.id = 'comb-' + c.id;

  // Barre de vie
  const pct = Math.max(0, c.wounds / c.wmax * 100);
  const barColor = pct > 60 ? '#5E804F' : pct > 30 ? '#c0702a' : '#8b1a1a';

  // Badges états actifs
  const etatsActifs = ETATS.filter(e => c.etats[e.key]);
  const etatsBadges = etatsActifs.map(e => `<span class="etat-badge etat-${e.cls}">${e.label}</span>`).join('');

  // Stats chips (PNJ)
  let statsHtml = '';
  if (!c.isPJ && Object.keys(c.stats).length) {
    const labels = { cc:'CC', ct:'CT', f:'F', e:'E', bf:'BF', pa:'PA' };
    statsHtml = '<div class="stat-row">' +
      Object.entries(c.stats).map(([k,v]) => `<div class="stat-chip"><span class="stat-chip-label">${labels[k]||k}</span><span class="stat-chip-val">${v}</span></div>`).join('') +
    '</div>';
  }

  // Boutons états
  const etatsButtons = ETATS.map(e =>
    `<button class="etat-btn ${e.cls} ${c.etats[e.key]?'on':''}" onclick="toggleEtat('${c.id}','${e.key}')">${e.label}</button>`
  ).join('');

  div.innerHTML = `
    <div class="comb-header" onclick="toggleOpen('${c.id}')">
      <span class="comb-init">${c.init}</span>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
          <span class="comb-name">${c.nom}</span>
          ${c.isPJ ? `<span class="comb-type" style="color:var(--SUB);">${c.joueur}</span>` : `<span class="comb-type type-${c.type}">${c.type}</span>`}
        </div>
        <div style="display:flex;align-items:center;gap:0.6rem;margin-top:0.25rem;flex-wrap:wrap;">
          <div class="comb-wounds-mini">
            <div class="wounds-bar-wrap"><div class="wounds-bar" style="width:${pct}%;background:${barColor};"></div></div>
            <span class="wounds-text">${c.wounds}/${c.wmax}</span>
          </div>
          <div class="etats-mini">${etatsBadges}</div>
        </div>
      </div>
      <div class="comb-ctrl" onclick="event.stopPropagation()">
        <button class="comb-turn-btn ${c.id===activeTurnId?'is-active':''}" onclick="setActiveTurn('${c.id}')">${c.id===activeTurnId?'● Tour':'Tour'}</button>
        ${!c.isPJ ? `<button class="comb-expand" onclick="toggleOpen('${c.id}')">▾</button>` : ''}
        <button class="comb-del" onclick="removeCombatant('${c.id}')">✕</button>
      </div>
    </div>
    <div class="comb-body">
      ${statsHtml}
      <div class="wounds-ctrl">
        <span class="wounds-label">Blessures</span>
        <button class="btn-w btn-dmg" onclick="changeWounds('${c.id}',-1)">−</button>
        <span class="wounds-current" id="w-${c.id}">${c.wounds}</span>
        <span class="wounds-sep">/</span>
        <span class="wounds-max-val">${c.wmax}</span>
        <button class="btn-w btn-heal" onclick="changeWounds('${c.id}',1)">+</button>
        <button class="btn-w btn-dmg" style="margin-left:0.25rem;font-size:0.7rem;width:auto;padding:0 0.4rem;" onclick="changeWounds('${c.id}',-3)">−3</button>
        <button class="btn-w btn-dmg" style="font-size:0.7rem;width:auto;padding:0 0.4rem;" onclick="changeWounds('${c.id}',-5)">−5</button>
      </div>
      <div class="etats-section">
        <span class="etats-label">États</span>
        <div class="etats-buttons">${etatsButtons}</div>
      </div>
      <textarea class="notes-inline" placeholder="Notes, capacités, remarques..." onblur="saveNotes('${c.id}',this.value)">${c.notes||''}</textarea>
    </div>
  `;

  // PJ : ouvrir aussi la fiche (blessures + états) mais simplifié
  if (c.isPJ) {
    const body = div.querySelector('.comb-body');
    body.innerHTML = `
      <div class="wounds-ctrl">
        <span class="wounds-label">Blessures</span>
        <button class="btn-w btn-dmg" onclick="changeWounds('${c.id}',-1)">−</button>
        <span class="wounds-current" id="w-${c.id}">${c.wounds}</span>
        <span class="wounds-sep">/</span>
        <span class="wounds-max-val">${c.wmax}</span>
        <button class="btn-w btn-heal" onclick="changeWounds('${c.id}',1)">+</button>
      </div>
      <div class="etats-section">
        <span class="etats-label">États</span>
        <div class="etats-buttons">${etatsButtons}</div>
      </div>
    `;
    // PJ : clic header ouvre aussi
    div.querySelector('.comb-header').addEventListener('click', () => toggleOpen(c.id));
  }

  if (combatants.find(x=>x.id===c.id)?.open) div.classList.add('open');
  return div;
}

// ══════════ ACTIONS ══════════
function toggleOpen(id) {
  const c = combatants.find(x=>x.id===id);
  if (c) { c.open = !c.open; render(); }
}

function setActiveTurn(id) {
  activeTurnId = activeTurnId === id ? null : id;
  render();
}

function nextTurn() {
  if (!combatants.length) return;
  const alive = combatants.filter(c => !c.etats.mort && !c.etats.inconscient);
  if (!alive.length) return;
  const idx = alive.findIndex(c => c.id === activeTurnId);
  if (idx === -1 || idx === alive.length - 1) {
    activeTurnId = alive[0].id;
    if (idx === alive.length - 1) round++;
  } else {
    activeTurnId = alive[idx+1].id;
  }
  render();
}

function changeRound(d) {
  round = Math.max(1, round + d);
  document.getElementById('round-num').textContent = round;
}

function changeWounds(id, delta) {
  const c = combatants.find(x=>x.id===id);
  if (!c) return;
  c.wounds = Math.max(0, Math.min(c.wmax, c.wounds + delta));
  render();
}

function toggleEtat(id, key) {
  const c = combatants.find(x=>x.id===id);
  if (!c) return;
  c.etats[key] = !c.etats[key];
  render();
}

function saveNotes(id, val) {
  const c = combatants.find(x=>x.id===id);
  if (c) c.notes = val;
}

function removeCombatant(id) {
  combatants = combatants.filter(c=>c.id!==id);
  if (activeTurnId === id) activeTurnId = null;
  render();
}

function sortByInit() {
  combatants.sort((a,b) => b.init - a.init);
  render();
}

function resetTurn() {
  activeTurnId = combatants.length ? combatants[0].id : null;
  render();
}

function healAll() {
  combatants.forEach(c => { c.wounds = c.wmax; c.etats = {}; });
  render();
}

function clearDead() {
  combatants = combatants.filter(c => !c.etats.mort);
  render();
}

function clearAll() {
  if (!confirm('Vider tout le combat ?')) return;
  combatants = []; activeTurnId = null; round = 1;
  render();
}

// Entrée clavier pour ajouter PNJ
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'pnj-nom') addPNJ();
  if (e.key === 'Enter' && document.activeElement.id === 'pnj-init') addPNJ();
  if (e.key === 'ArrowRight' && e.altKey) nextTurn();
});

render();
</script>
</body>
</html>
